<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Cybersecurity Threat Detection</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <div class="card" style="max-width: 500px; margin: 80px auto;">

            <h1>🔐 Login</h1>
            <p>Cybersecurity Threat Detection System</p>

            <form onsubmit="return loginUser()">

                <div style="margin: 20px 0;">
                    <input 
                        type="text" 
                        id="username"
                        placeholder="Enter Username"
                        required
                        style="width: 80%; padding: 12px;"
                    >
                </div>

                <div style="margin: 20px 0;">
                    <input 
                        type="password" 
                        id="password"
                        placeholder="Enter Password"
                        required
                        style="width: 80%; padding: 12px;"
                    >
                </div>

                <button type="submit">
                    Login
                </button>

                <br><br>

                <a href="register.html">Create New Account</a>

                <br><br>

                <a href="forgetPass.html">Forgot Password?</a>

            </form>

        </div>

    </div>

    <script>
    function loginUser() {
        const emailInput = document.getElementById("username").value;
        const passInput = document.getElementById("password").value;

        const savedEmail = localStorage.getItem("userEmail");
        const savedPass = localStorage.getItem("userPassword");

        if (emailInput === savedEmail && passInput === savedPass) {
            alert("Login Successful!");
            window.location.href = "index.html";
        } else if (emailInput === "admin" && passInput === "admin123") {
            alert("Admin Login Successful!");
            window.location.href = "index.html";
        } else {
            alert("Invalid credentials. Please try again.");
        }
        return false; 
    }
</script>

</body>
</html>
