<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="card" style="max-width:500px; margin:80px auto;">

        <h1>🔑 Forgot Password</h1>
        <p>Reset your password for Cybersecurity Threat Detection System</p>

        <input 
            type="email" 
            placeholder="Enter Registered Email" 
            required
            style="width: 80%; padding: 12px;"
        >
        <br><br>

        <button onclick="alert('Reset Link Sent!')">
            Send Reset Link
        </button>

        <br><br>

        <a href="login.html">
            Back to Login
        </a>

    </div>
</div>

</body>
</html>
